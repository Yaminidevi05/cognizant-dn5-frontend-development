<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Portal</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            font-family:Arial,sans-serif;
            padding:20px;
            background:#f4f4f4;
        }

        h1{
            margin-bottom:20px;
        }

        .controls{
            margin-bottom:20px;
        }

        #search-courses{
            padding:8px;
            width:250px;
        }

        #sort-btn{
            padding:8px 12px;
            cursor:pointer;
        }

        .course-grid{
            display:grid;
            grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
            gap:20px;
        }

        .course-card{
            background:white;
            border:1px solid #ccc;
            border-radius:8px;
            padding:15px;
            cursor:pointer;
            box-shadow:0 2px 5px rgba(0,0,0,0.1);
        }

        .course-card:hover{
            background:#f0f0f0;
        }

        .course-card h3{
            margin-bottom:10px;
        }

        .course-card p{
            margin-bottom:8px;
        }

        #total-credits{
            margin-top:20px;
            font-weight:bold;
        }

        #selected-course{
            margin-top:15px;
            font-weight:bold;
            color:green;
        }
    </style>
</head>
<body>

    <h1>Student Portal</h1>

    <div class="controls">
        <input
            type="text"
            id="search-courses"
            placeholder="Search courses..."
        >

        <button id="sort-btn">
            Sort by Credits
        </button>
    </div>

    <div class="course-grid"></div>

    <p id="total-credits"></p>

    <div id="selected-course"></div>

    <script type="module" src="Hands_on_3(2).js"></script>

</body>
</html>
