<h1>Student Portal</h1>

<a routerLink="/">Courses</a> | 
<a routerLink="/profile">Profile</a>
<form
[formGroup]="profileForm"
(ngSubmit)="submit()">

<label>Name</label>

<input
type="text"
formControlName="name">

<div
*ngIf="profileForm.get('name')?.touched &&
profileForm.get('name')?.invalid">

Name is required

</div>

<br>

<label>Email</label>

<input
type="email"
formControlName="email">

<div
*ngIf="profileForm.get('email')?.touched &&
profileForm.get('email')?.invalid">

Enter a valid email

</div>

<br>

<label>Semester</label>

<input
type="number"
formControlName="semester">

<div
*ngIf="profileForm.get('semester')?.touched &&
profileForm.get('semester')?.invalid">

Semester must be between 1 and 8

</div>

<br>

<button
type="submit"
[disabled]="profileForm.invalid">

Submit

</button>

</form>
